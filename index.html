<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Devil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>LEVEL DEVIL</h1>
            <div class="game-info">
                <span>Level: <span id="level-display">1</span></span>
                <span>Deaths: <span id="death-count">0</span></span>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="game-controls">
            <p><strong>Controls:</strong></p>
            <p>← → Arrow Keys: Move</p>
            <p>Space / ↑: Jump</p>
            <p>R: Restart Level</p>
            <p style="color: #ffa502; margin-top: 10px;">💀 Auto-restarts on death!</p>
        </div>
        <div id="game-over" class="modal hidden">
            <div class="modal-content">
                <h2>Level Complete!</h2>
                <p>Press SPACE to continue</p>
            </div>
        </div>
        <div id="death-screen" class="modal hidden">
            <div class="modal-content death">
                <h2>YOU DIED!</h2>
                <p>Press SPACE to retry</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
